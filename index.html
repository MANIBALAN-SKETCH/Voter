<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voter</title>

  <!-- Model Viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      width: 100%;
      margin: auto;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: #ddd;
    }

    .model-viewer {
      width: 100%;
      height: 500px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .ar-button {
      background: #ff9800;
      color: white;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      margin-top: 15px;
    }

    .ar-button:hover {
      background-color: #e68a00;
    }

    .note {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #bbb;
    }
  </style>
</head>

<body>

  <!-- 🎵 Background Music -->
  <audio id="bgMusic" loop>
    <source src="Aud.mp3" type="audio/mpeg">
  </audio>

  <main class="container">
    <h1>Voter</h1>
    <p class="subtitle">Allreal</p>

    <model-viewer
      src="voter1.glb"
      ios-src="model.usdz"
      ar
      ar-modes="scene-viewer webxr quick-look"
      camera-controls
      autoplay
      shadow-intensity="1"
      alt="3D model"
      class="model-viewer"
    >
      <button slot="ar-button" class="ar-button">👓 View in AR</button>
    </model-viewer>

    <!-- 🔊 Toggle Button -->
    <button id="musicBtn" class="ar-button">
      🔊 Play Music
    </button>

    <p class="note">No app required – works in your browser.</p>
  </main>

  <!-- ✅ Script -->
  <script>
    const music = document.getElementById("bgMusic");
    const btn = document.getElementById("musicBtn");

    let isPlaying = false;

    btn.addEventListener("click", () => {
      if (!isPlaying) {
        music.volume = 0.5;

        music.play().then(() => {
          btn.innerText = "⏹ Stop Music";
          isPlaying = true;
        }).catch(err => {
          console.log("Playback blocked:", err);
        });

      } else {
        music.pause();
        music.currentTime = 0;

        btn.innerText = "🔊 Play Music";
        isPlaying = false;
      }
    });
  </script>

</body>
</html>
