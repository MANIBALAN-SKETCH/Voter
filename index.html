<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voter</title>

  <!-- Model Viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 🎵 Background Music -->
  <audio id="bgMusic" loop>
    <source src="Aud.mp3" type="audio/mpeg">
  </audio>

  <main class="container">
    <h1>Voter</h1>
    <p class="subtitle">Allreal</p>

    <model-viewer
      src="voter1.glb"
      ios-src="model.usdz"
      ar
      ar-modes="scene-viewer webxr quick-look"
      camera-controls
      autoplay
      shadow-intensity="1"
      alt="3D model"
      class="model-viewer"
    >
      <button slot="ar-button" class="ar-button">👓 View in AR</button>
    </model-viewer>

    <!-- 🔊 Toggle Music Button -->
    <button id="musicBtn" class="ar-button" style="margin-top: 15px;">
      🔊 Play Music
    </button>

    <p class="note">No app required – works in your browser.</p>
  </main>

  <!-- ✅ Script -->
  <script>
    const music = document.getElementById("bgMusic");
    const btn = document.getElementById("musicBtn");

    let isPlaying = false;

    btn.addEventListener("click", () => {
      if (!isPlaying) {
        music.volume = 0.5;

        music.play().then(() => {
          btn.innerText = "⏹ Stop Music";
          isPlaying = true;
        }).catch(err => {
          console.log("Playback blocked:", err);
        });

      } else {
        music.pause();
        music.currentTime = 0; // reset (optional)

        btn.innerText = "🔊 Play Music";
        isPlaying = false;
      }
    });
  </script>

</body>
</html>
